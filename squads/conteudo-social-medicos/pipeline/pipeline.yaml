name: "Pipeline — Conteúdo Social Médicos"
version: "3.0.0"
created: "2026-04-10"
squad: "conteudo-social-medicos"

description: >
  Pipeline de 9 etapas: pesquisa → copy → revisão → aprovação → design → publicação.
  4 checkpoints de controle do usuário.

mode: "economico"

steps:
  - id: step-00
    name: "Período de Pesquisa"
    type: checkpoint
    file: steps/step-00-research-period.md

  - id: step-01
    name: "Pesquisa de Notícias"
    type: agent
    agent: pesquisador
    file: steps/step-01-search-news.md
    depends_on: step-00

  - id: step-02
    name: "Escolha do Tema"
    type: checkpoint
    file: steps/step-02-choose-topic.md
    depends_on: step-01

  - id: step-03
    name: "Criação do Conteúdo"
    type: agent
    agent: redator
    file: steps/step-03-create-content.md
    depends_on: step-02

  - id: step-04
    name: "Revisão de Qualidade"
    type: agent
    agent: revisor
    file: steps/step-04-quality-check.md
    depends_on: step-03

  - id: step-05
    name: "Aprovação do Conteúdo"
    type: checkpoint
    file: steps/step-05-approve-content.md
    depends_on: step-04

  - id: step-06
    name: "Design do Card"
    type: agent
    agent: designer
    file: steps/step-06-design-card.md
    depends_on: step-05

  - id: step-07
    name: "Aprovação para Publicação"
    type: checkpoint
    file: steps/step-07-approve-publish.md
    depends_on: step-06

  - id: step-08
    name: "Publicação no Instagram"
    type: agent
    agent: publicador
    file: steps/step-08-publish.md
    depends_on: step-07

checkpoints:
  - step-00  # Período de pesquisa
  - step-02  # Escolha do tema
  - step-05  # Aprovação do conteúdo
  - step-07  # Aprovação para publicação

output:
  artifacts:
    - output/ranked-stories.yaml
    - output/content-draft.md
    - output/quality-review.md
    - output/design/card.jpg
    - output/publish-report.md
